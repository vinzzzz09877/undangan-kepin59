<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Undangan Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f5f5;
    color:#333;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    min-height:100vh;
}

.hero{
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    color:white;
    text-align:center;
    padding:50px 20px;
}

.hero h1{
    font-size:32px;
    margin-bottom:10px;
}

.hero p{
    font-size:15px;
}

.couple{
    text-align:center;
    padding:30px 20px;
}

.couple img{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
    border:5px solid #2575fc;
}

.couple h2{
    font-size:28px;
    margin-bottom:10px;
}

.event-details{
    padding:20px;
    background:#f0f4ff;
    margin:20px;
    border-radius:15px;
}

.event-details h3{
    margin-bottom:15px;
    text-align:center;
}

.event-details p{
    margin-bottom:10px;
}

.rsvp{
    padding:20px;
}

.rsvp h3{
    text-align:center;
    margin-bottom:20px;
}

form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

input,select{
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
}

button{
    padding:12px;
    border:none;
    background:#2575fc;
    color:white;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1259d6;
}

footer{
    text-align:center;
    padding:20px;
    font-size:14px;
    color:#777;
}

/* Tombol Musik */
#musicBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#2575fc;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<header class="hero">
    <h1>Undangan Ulang Tahun</h1>
    <p>Kami mengundang Anda untuk merayakan hari spesial kami 🎉</p>
</header>

<section class="couple">
    <img src="Kepin.jpg" alt="Foto">
    <h2>Kepin Cristian</h2>
    <p>Ulang Tahun pada 09 Mei 2026</p>
</section>

<section class="event-details">
    <h3>Waktu & Lokasi</h3>

    <p><strong>Acara:</strong> 31 Mei 2026</p>
    <p><strong>Jam:</strong> 08:00 WIB - Selesai</p>
    <p><strong>Lokasi:</strong> Gedung Rajawali Sakti, Panam</p>
</section>

<section class="rsvp">
    <h3>Konfirmasi Kehadiran</h3>

    <form id="rsvpForm">
        <input type="text" id="name" placeholder="Nama Anda" required>

        <input type="email" id="email" placeholder="Email Anda" required>

        <select id="attendance" required>
            <option value="">Apakah Anda hadir?</option>
            <option value="Hadir">Hadir</option>
            <option value="Tidak Hadir">Tidak Hadir</option>
        </select>

        <button type="submit">Kirim</button>
    </form>
</section>

<footer>
    <p>&copy; 2026 Undangan Digital Kepin C.</p>
</footer>

</div>

<!-- Musik -->
<audio id="bgMusic" loop>
    <source src="mixkit-latin-lovers-39.mp3" type="audio/mpeg">
</audio>

<!-- Tombol Musik -->
<button id="musicBtn">🎵 Play Music</button>

<script>
const music = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

let isPlaying = false;

btn.onclick = function () {

    if(isPlaying){
        music.pause();
        btn.innerHTML = "🎵 Play Music";
    } else {
        music.play();
        btn.innerHTML = "⏸ Pause Music";
    }

    isPlaying = !isPlaying;
};

document.getElementById("rsvpForm").addEventListener("submit", function(e){
    e.preventDefault();

    alert("Konfirmasi kehadiran berhasil dikirim!");
});
</script>

</body>
    </html>
